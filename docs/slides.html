    <section data-markdown><script type="text/template">
## O problema: caminho mínimo

- Dado um mapa com obstáculos, **qual o caminho mais curto** entre dois pontos?
- Modelo: grade 2D → grafo (células livres = vértices, 4 direções, custo 1)
- Onde aparece: **jogos**, **robótica**, **GPS**, planejamento, puzzles

**Dijkstra** resolve… mas explora "em círculos".
Podemos fazer melhor se **soubermos a direção do destino**.
    </script></section>

    <section data-markdown><script type="text/template">
## A ideia do A*

Busca de melhor-primeiro ordenada por:

### f(v) = g(v) + h(v)

- **g(v)** — custo real da origem até v
- **h(v)** — estimativa heurística de v até o destino
- h ≡ 0 ⟹ A* vira o Dijkstra

Heurística usada: **distância de Manhattan** — h(v) = |Δlinha| + |Δcoluna|
    </script></section>

    <section data-markdown><script type="text/template">
## Por que o resultado é ótimo?

A heurística de Manhattan (grade, 4 direções, custo 1) é:

- **Admissível** — nunca superestima o custo real
- **Consistente** — h(u) ≤ 1 + h(v) para vizinhos
  ⟹ cada vértice é expandido **no máximo uma vez**

> Com heurística admissível e consistente, o primeiro caminho
> encontrado pelo A* é **garantidamente o de menor custo**.
    </script></section>

    <section data-markdown><script type="text/template">
## Pseudocódigo

```text
A*(grade, origem, destino):
    aberta <- heap-mínimo ordenado por (f, h, ordem)
    g[origem] <- 0; insere origem com f = h(origem)
    enquanto aberta não vazia:
        v <- remove-mínimo(aberta)
        se v já expandido: continua        # lazy deletion
        marca v como expandido
        se v = destino: retorna caminho (pais)
        para cada vizinho u livre de v:
            g' <- g[v] + 1
            se g' < g[u]:
                g[u] <- g'; pai[u] <- v
                insere u com f = g' + h(u)
```

Heap binário + *lazy deletion* — idêntico nas duas linguagens.
    </script></section>

    <section data-markdown><script type="text/template">
## Classificação assintótica

Grade com **n células** ⟹ V = n, E = O(n); heap: O(log n)/operação.

| Limite | Valor | Situação |
|---|---|---|
| **Big-O** | **O(n log n)** | heurística não ajuda |
| **Big-Ω** | **Ω(L)** | heurística perfeita (L = √n aqui) |
| **Big-Θ** | por caso | pior: Θ(n log n) · melhor: Θ(√n log n) · médio: ≈ Θ(n) |

Memória: **O(n)**. Espaços implícitos: **O(b^d)** (exponencial).
    </script></section>

    <section data-markdown><script type="text/template">
## Cenários dos experimentos

| Cenário | Entrada | Comportamento |
|---|---|---|
| **Melhor** | grade vazia, destino na mesma linha | expande só a linha reta |
| **Médio** | obstáculos aleatórios 25% | ~8% da grade |
| **Pior** | labirinto em serpentina | **todas** as células livres |

Tamanhos: **51×51** · **151×151** · **301×301** (+ intermediários)
    </script></section>

    <section data-markdown><script type="text/template">
## Metodologia

- **30 rodadas** por (cenário × tamanho × linguagem) + 3 de aquecimento (JIT!)
- `time.perf_counter_ns()` / `process.hrtime.bigint()`
- i5-10500 (6C/12T), 16 GB RAM, Windows 11 Pro

**Comparação justa:**
- mesmo PRNG bit a bit ⟹ **grades idênticas**
- mesmo desempate ⟹ **mesmos nós expandidos**
- `tools/verificar_equivalencia.py` confere tudo
    </script></section>

    <section data-markdown><script type="text/template">
## Curiosidade: quando o "lento" ganha

Melhor caso, 51×51 (51 nós): Python **0,166 ms** × JS **0,261 ms**

Em execuções submilissegundo, **custos fixos do runtime**
dominam o termo assintótico.

> Análise assintótica descreve o **crescimento**,
> não o valor absoluto em entradas pequenas.
    </script></section>

    <section data-markdown><script type="text/template">
## Aplicabilidade e limitações

**Brilha quando** há heurística admissível barata:
jogos, robótica, GPS, planejamento, puzzles.

**Limitações:** memória O(V) → IDA*/SMA* · heurística fraca → Dijkstra ·
mapas dinâmicos → D* Lite · consultas repetidas → pré-processamento
    </script></section>

    <section data-markdown><script type="text/template">
## Reflexão: P, NP e vizinhos

- Caminho mínimo (pesos ≥ 0) ∈ **P**
- Variantes **NP-completas/difíceis**: caminho mais longo, TSP,
  restrição de recursos, *multi-agent pathfinding*, (n²−1)-puzzle

> O mesmo algoritmo: polinomial em P, exponencial em espaços NP-difíceis.
> Heurística muda constantes — **nunca a classe**.
    </script></section>

    <section data-markdown><script type="text/template">
## Conclusões

- A* = Dijkstra + heurística: **ótimo** com h admissível/consistente
- Pior caso ⟶ reta n log n em log-log: teoria confirmada
- JS 4,5–6,4× mais rápido **no pior caso** (JIT), mas **mesma assintótica**
